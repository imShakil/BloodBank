name: BloodPoint Android CI/CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (example: v2.1.0)"
        required: true

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4096m
  ANDROID_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || (github.ref_type == 'tag' && github.ref_name || 'main') }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    
    steps:
      - name: Clone private Android repo
        env:
          MOBILE_APP_REPO: ${{ secrets.MOBILE_APP_REPO }}
          MOBILE_APP_PAT: ${{ secrets.MOBILE_APP_PAT }}
        run: |
          test -n "${MOBILE_APP_REPO}"
          test -n "${MOBILE_APP_PAT}"

          rm -rf android

          REPO_URL="https://x-access-token:${MOBILE_APP_PAT}@github.com/${MOBILE_APP_REPO}.git"

          if [ -z "${ANDROID_REF}" ]; then
            echo "ANDROID_REF is empty. Provide workflow input 'version' or trigger from a tag."
            exit 1
          fi

          if ! git ls-remote --exit-code --heads --tags "${REPO_URL}" "${ANDROID_REF}" >/dev/null 2>&1; then
            echo "Ref '${ANDROID_REF}' not found in ${MOBILE_APP_REPO}"
            exit 1
          fi

          git clone --depth 1 --branch "${ANDROID_REF}" "${REPO_URL}" android

          test -f android/gradlew

      - name: Set app version from tag/ref
        run: |
          VERSION_NAME="${RELEASE_TAG#v}"
          if ! echo "${VERSION_NAME}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "VERSION_NAME '${VERSION_NAME}' must be semantic version format: X.Y.Z"
            exit 1
          fi

          IFS='.' read -r VERSION_MAJOR VERSION_MINOR VERSION_PATCH <<EOF
          ${VERSION_NAME}
          EOF
          VERSION_CODE=$((VERSION_MAJOR * 1000000 + VERSION_MINOR * 1000 + VERSION_PATCH))

          BUILD_FILE=""
          if [ -f app/build.gradle ]; then
            BUILD_FILE="app/build.gradle"
          elif [ -f app/build.gradle.kts ]; then
            BUILD_FILE="app/build.gradle.kts"
          else
            echo "Could not find app/build.gradle or app/build.gradle.kts"
            exit 1
          fi

          sed -E -i.bak \
            -e "s/versionName[[:space:]]+\"[^\"]*\"/versionName \"${VERSION_NAME}\"/" \
            -e "s/versionCode[[:space:]]+[0-9]+/versionCode ${VERSION_CODE}/" \
            "${BUILD_FILE}"

          if ! grep -q "versionName \"${VERSION_NAME}\"" "${BUILD_FILE}"; then
            echo "Failed to set versionName in ${BUILD_FILE}"
            exit 1
          fi

          if ! grep -q "versionCode ${VERSION_CODE}" "${BUILD_FILE}"; then
            echo "Failed to set versionCode in ${BUILD_FILE}"
            exit 1
          fi

          rm -f "${BUILD_FILE}.bak"
          echo "Resolved versionName=${VERSION_NAME}, versionCode=${VERSION_CODE}"
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> local.properties

      - name: Create release keystore from secret
        run: |
          mkdir -p keystore
          printf '%s' "${{ secrets.KEYSTORE_JKS_BASE64 }}" | base64 --decode > keystore/release.jks
      
      - name: Create keystore.properties for CI
        run: |
          echo "storeFile=keystore/release.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}" >> keystore.properties
      
      - name: Lint Analysis
        run: ./gradlew lint
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      
      - name: Build Release APK
        run: ./gradlew assembleRelease
      
      - name: Build Release AAB (Android App Bundle)
        run: ./gradlew bundleRelease
      
      - name: Run Unit Tests
        run: ./gradlew test
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v3
        with:
          name: bloodpoint-debug
          path: android/app/build/outputs/apk/debug/*.apk
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v3
        with:
          name: bloodpoint-release
          path: android/app/build/outputs/apk/release/*.apk
      
      - name: Upload Release AAB
        uses: actions/upload-artifact@v3
        with:
          name: bloodpoint-aab
          path: android/app/build/outputs/bundle/release/*.aab
      
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: android/app/build/reports/tests/testDebugUnitTest/

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    
    steps:
      - name: Clone private Android repo
        env:
          MOBILE_APP_REPO: ${{ secrets.MOBILE_APP_REPO }}
          MOBILE_APP_PAT: ${{ secrets.MOBILE_APP_PAT }}
        run: |
          test -n "${MOBILE_APP_REPO}"
          test -n "${MOBILE_APP_PAT}"

          rm -rf android

          REPO_URL="https://x-access-token:${MOBILE_APP_PAT}@github.com/${MOBILE_APP_REPO}.git"

          if [ -z "${ANDROID_REF}" ]; then
            echo "ANDROID_REF is empty. Provide workflow input 'version' or trigger from a tag."
            exit 1
          fi

          if ! git ls-remote --exit-code --heads --tags "${REPO_URL}" "${ANDROID_REF}" >/dev/null 2>&1; then
            echo "Ref '${ANDROID_REF}' not found in ${MOBILE_APP_REPO}"
            exit 1
          fi

          git clone --depth 1 --branch "${ANDROID_REF}" "${REPO_URL}" android

          test -f android/gradlew
      
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> local.properties
      
      - name: Check for exposed secrets
        run: |
          ./gradlew checkSecrets || true
      
      - name: Generate coverage reports
        run: ./gradlew test --info
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./android/app/build/reports/coverage/debug/report.xml

  security-scanning:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Clone private Android repo
        env:
          MOBILE_APP_REPO: ${{ secrets.MOBILE_APP_REPO }}
          MOBILE_APP_PAT: ${{ secrets.MOBILE_APP_PAT }}
        run: |
          test -n "${MOBILE_APP_REPO}"
          test -n "${MOBILE_APP_PAT}"

          rm -rf android

          REPO_URL="https://x-access-token:${MOBILE_APP_PAT}@github.com/${MOBILE_APP_REPO}.git"

          if [ -z "${ANDROID_REF}" ]; then
            echo "ANDROID_REF is empty. Provide workflow input 'version' or trigger from a tag."
            exit 1
          fi

          if ! git ls-remote --exit-code --heads --tags "${REPO_URL}" "${ANDROID_REF}" >/dev/null 2>&1; then
            echo "Ref '${ANDROID_REF}' not found in ${MOBILE_APP_REPO}"
            exit 1
          fi

          git clone --depth 1 --branch "${ANDROID_REF}" "${REPO_URL}" android

          test -f android/gradlew
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  release-github:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Validate release tag format
        run: |
          if [[ ! "${{ env.RELEASE_TAG }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag '${{ env.RELEASE_TAG }}'. Expected format: vX.Y.Z"
            exit 1
          fi

      - name: Download release APK artifact
        uses: actions/download-artifact@v8
        with:
          name: bloodpoint-release
          path: release-apk

      - name: Download release AAB artifact
        uses: actions/download-artifact@v8
        with:
          name: bloodpoint-aab
          path: release-aab

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: BloodPoint ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          body: |
            ## BloodPoint Android Release

            This release contains signed Android build artifacts for `${{ env.RELEASE_TAG }}`.

            ### Assets
            - `app-release.apk`: installable release APK
            - `app-release.aab`: release Android App Bundle

            ### Build Info
            - Android source repo: private repository
            - Source ref: `${{ env.ANDROID_REF }}`
            - Built by workflow: `${{ github.workflow }}`
            - Run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
          files: |
            release-apk/*.apk
            release-aab/*.aab

# Secrets required in GitHub repository settings:
# - MOBILE_APP_REPO: Private Android repository in owner/name format (example: imShakil/BloodPoint)
# - MOBILE_APP_PAT: Fine-grained PAT with read access to MOBILE_APP_REPO
# - GOOGLE_MAPS_API_KEY: Restricted Google Maps API key
# - KEYSTORE_JKS_BASE64: Base64-encoded release keystore (.jks) content
# - KEYSTORE_PASSWORD: Release keystore password
# - KEYSTORE_KEY_ALIAS: Release keystore key alias
# - KEYSTORE_KEY_PASSWORD: Release keystore key password
