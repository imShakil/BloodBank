name: BloodPoint Android CI/CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (example: v2.1.0)"
        required: true

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.daemon=false
  ANDROID_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || (github.ref_type == 'tag' && github.ref_name || 'main') }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Clone private Android repo
        env:
          MOBILE_APP_REPO: ${{ secrets.MOBILE_APP_REPO }}
          MOBILE_APP_PAT: ${{ secrets.MOBILE_APP_PAT }}
        run: |
          set -euo pipefail
          
          test -n "${MOBILE_APP_REPO}"
          test -n "${MOBILE_APP_PAT}"

          rm -rf android

          REPO_URL="https://x-access-token:${MOBILE_APP_PAT}@github.com/${MOBILE_APP_REPO}.git"

          if [ -z "${ANDROID_REF}" ]; then
            echo "ANDROID_REF is empty. Provide workflow input 'version' or trigger from a tag."
            exit 1
          fi

          if git ls-remote --exit-code --heads --tags "${REPO_URL}" "${ANDROID_REF}" >/dev/null 2>&1; then
            git clone --depth 1 --branch "${ANDROID_REF}" "${REPO_URL}" android
          else
            echo "Ref '${ANDROID_REF}' not found in ${MOBILE_APP_REPO}; falling back to main"
            git clone --depth 1 --branch "main" "${REPO_URL}" android
          fi

          test -f android/gradlew

      - name: Set app version from tag/ref
        working-directory: android
        run: |
          set -euo pipefail
          
          VERSION_NAME="${RELEASE_TAG#v}"
          if ! echo "${VERSION_NAME}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "VERSION_NAME '${VERSION_NAME}' must be semantic version format: X.Y.Z"
            exit 1
          fi

          IFS='.' read -r VERSION_MAJOR VERSION_MINOR VERSION_PATCH <<EOF
          ${VERSION_NAME}
          EOF
          VERSION_CODE=$((VERSION_MAJOR * 1000000 + VERSION_MINOR * 1000 + VERSION_PATCH))

          BUILD_FILE=""
          if [ -f app/build.gradle ]; then
            BUILD_FILE="app/build.gradle"
          elif [ -f app/build.gradle.kts ]; then
            BUILD_FILE="app/build.gradle.kts"
          else
            echo "Could not find app/build.gradle or app/build.gradle.kts"
            exit 1
          fi

          sed -E -i.bak \
            -e "s/versionName[[:space:]]+\"[^\"]*\"/versionName \"${VERSION_NAME}\"/" \
            -e "s/versionCode[[:space:]]+[0-9]+/versionCode ${VERSION_CODE}/" \
            "${BUILD_FILE}"

          if ! grep -q "versionName \"${VERSION_NAME}\"" "${BUILD_FILE}"; then
            echo "Failed to set versionName in ${BUILD_FILE}"
            exit 1
          fi

          if ! grep -q "versionCode ${VERSION_CODE}" "${BUILD_FILE}"; then
            echo "Failed to set versionCode in ${BUILD_FILE}"
            exit 1
          fi

          rm -f "${BUILD_FILE}.bak"
          echo "Resolved versionName=${VERSION_NAME}, versionCode=${VERSION_CODE}"
      
      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Validate Gradle wrapper
        working-directory: android
        run: |
          set -euo pipefail
          sha256sum gradle/wrapper/gradle-wrapper.jar
      
      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x gradlew
      
      - name: Create local.properties
        working-directory: android
        run: |
          set -euo pipefail
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> local.properties
          chmod 600 local.properties

      - name: Create google-services.json from secret
        working-directory: android
        run: |
          set -euo pipefail
          mkdir -p app
          printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json
          chmod 600 app/google-services.json

      - name: Create release keystore from secret
        working-directory: android
        run: |
          set -euo pipefail
          mkdir -p keystore
          printf '%s' "${{ secrets.KEYSTORE_JKS_BASE64 }}" | base64 --decode > keystore/release.jks
          chmod 600 keystore/release.jks
      
      - name: Create keystore.properties for CI
        working-directory: android
        run: |
          set -euo pipefail
          echo "storeFile=keystore/release.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}" >> keystore.properties
          chmod 600 keystore.properties
      
      - name: Lint Analysis
        working-directory: android
        run: ./gradlew lint --no-daemon --stacktrace
      
      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: lint-reports
          path: android/app/build/reports/lint-results*.html
          if-no-files-found: ignore
          retention-days: 30
      
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
      
      - name: Build Release AAB (Android App Bundle)
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon --stacktrace
      
      - name: Run Unit Tests
        working-directory: android
        run: ./gradlew test --no-daemon --stacktrace
        continue-on-error: true
      
      - name: Generate APK checksums
        working-directory: android/app/build/outputs/apk/release
        run: |
          set -euo pipefail
          if ls *.apk 1> /dev/null 2>&1; then
            sha256sum *.apk > checksums.txt
            cat checksums.txt
          fi
      
      - name: Generate AAB checksums
        working-directory: android/app/build/outputs/bundle/release
        run: |
          set -euo pipefail
          if ls *.aab 1> /dev/null 2>&1; then
            sha256sum *.aab > checksums.txt
            cat checksums.txt
          fi
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v7.0.0
        with:
          name: bloodpoint-debug-${{ env.RELEASE_TAG }}
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v7.0.0
        with:
          name: bloodpoint-release-${{ env.RELEASE_TAG }}
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/release/checksums.txt
          if-no-files-found: error
          retention-days: 90
      
      - name: Upload Release AAB
        uses: actions/upload-artifact@v7.0.0
        with:
          name: bloodpoint-aab-${{ env.RELEASE_TAG }}
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/bundle/release/checksums.txt
          if-no-files-found: error
          retention-days: 90
      
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: test-reports-${{ env.RELEASE_TAG }}
          path: android/app/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 30
      
      - name: Cleanup sensitive files
        if: always()
        working-directory: android
        run: |
          rm -f local.properties
          rm -f keystore.properties
          rm -f keystore/release.jks
          rm -f app/google-services.json

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Clone private Android repo
        env:
          MOBILE_APP_REPO: ${{ secrets.MOBILE_APP_REPO }}
          MOBILE_APP_PAT: ${{ secrets.MOBILE_APP_PAT }}
        run: |
          set -euo pipefail
          
          test -n "${MOBILE_APP_REPO}"
          test -n "${MOBILE_APP_PAT}"

          rm -rf android

          REPO_URL="https://x-access-token:${MOBILE_APP_PAT}@github.com/${MOBILE_APP_REPO}.git"

          if [ -z "${ANDROID_REF}" ]; then
            echo "ANDROID_REF is empty. Provide workflow input 'version' or trigger from a tag."
            exit 1
          fi

          if git ls-remote --exit-code --heads --tags "${REPO_URL}" "${ANDROID_REF}" >/dev/null 2>&1; then
            git clone --depth 1 --branch "${ANDROID_REF}" "${REPO_URL}" android
          else
            echo "Ref '${ANDROID_REF}' not found in ${MOBILE_APP_REPO}; falling back to main"
            git clone --depth 1 --branch "main" "${REPO_URL}" android
          fi

          test -f android/gradlew
      
      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Validate Gradle wrapper
        working-directory: android
        run: |
          set -euo pipefail
          sha256sum gradle/wrapper/gradle-wrapper.jar
      
      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x gradlew
      
      - name: Create local.properties
        working-directory: android
        run: |
          set -euo pipefail
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> local.properties
          chmod 600 local.properties

      - name: Create google-services.json from secret
        working-directory: android
        run: |
          set -euo pipefail
          mkdir -p app
          printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json
          chmod 600 app/google-services.json
      
      - name: Check for exposed secrets
        working-directory: android
        continue-on-error: true
        run: |
          ./gradlew checkSecrets --no-daemon || true
      
      - name: Generate coverage reports
        working-directory: android
        continue-on-error: true
        run: ./gradlew test jacocoTestReport --no-daemon --info
      
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5.5.2
        with:
          files: ./android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml,./android/app/build/reports/coverage/debug/report.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      
      - name: Cleanup sensitive files
        if: always()
        working-directory: android
        run: |
          rm -f local.properties
          rm -f app/google-services.json

  security-scanning:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Clone private Android repo
        env:
          MOBILE_APP_REPO: ${{ secrets.MOBILE_APP_REPO }}
          MOBILE_APP_PAT: ${{ secrets.MOBILE_APP_PAT }}
        run: |
          set -euo pipefail
          
          test -n "${MOBILE_APP_REPO}"
          test -n "${MOBILE_APP_PAT}"

          rm -rf android

          REPO_URL="https://x-access-token:${MOBILE_APP_PAT}@github.com/${MOBILE_APP_REPO}.git"

          if [ -z "${ANDROID_REF}" ]; then
            echo "ANDROID_REF is empty. Provide workflow input 'version' or trigger from a tag."
            exit 1
          fi

          if git ls-remote --exit-code --heads --tags "${REPO_URL}" "${ANDROID_REF}" >/dev/null 2>&1; then
            git clone --depth 1 --branch "${ANDROID_REF}" "${REPO_URL}" android
          else
            echo "Ref '${ANDROID_REF}' not found in ${MOBILE_APP_REPO}; falling back to main"
            git clone --depth 1 --branch "main" "${REPO_URL}" android
          fi

          test -f android/gradlew
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: 'android'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
      
      - name: Run Trivy vulnerability scanner (table output)
        uses: aquasecurity/trivy-action@0.34.0
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: 'android'
          format: 'table'
          severity: 'CRITICAL,HIGH'
      
      - name: Check if Trivy results exist
        id: check-trivy
        run: |
          if [ -f trivy-results.sarif ] && [ -s trivy-results.sarif ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Trivy SARIF file exists and is not empty"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Trivy SARIF file does not exist or is empty"
          fi
      
      - name: Upload Trivy results to GitHub Security
        if: steps.check-trivy.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-fs-scan'
      
      - name: Upload Trivy results as artifact
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: trivy-scan-results-${{ env.RELEASE_TAG }}
          path: trivy-results.sarif
          if-no-files-found: ignore
          retention-days: 90

  release-github:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Validate release tag format
        run: |
          set -euo pipefail
          if [[ ! "${{ env.RELEASE_TAG }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag '${{ env.RELEASE_TAG }}'. Expected format: vX.Y.Z"
            exit 1
          fi

      - name: Download release APK artifact
        uses: actions/download-artifact@v8.0.0
        with:
          name: bloodpoint-release-${{ env.RELEASE_TAG }}
          path: release-apk

      - name: Download release AAB artifact
        uses: actions/download-artifact@v8.0.0
        with:
          name: bloodpoint-aab-${{ env.RELEASE_TAG }}
          path: release-aab
      
      - name: Verify checksums
        run: |
          set -euo pipefail
          echo "Verifying APK checksums..."
          cd release-apk
          if [ -f checksums.txt ]; then
            sha256sum -c checksums.txt
          fi
          cd ..
          
          echo "Verifying AAB checksums..."
          cd release-aab
          if [ -f checksums.txt ]; then
            sha256sum -c checksums.txt
          fi
          cd ..
      
      - name: Rename files
        run: |
          set -euo pipefail
          mv release-apk/app-release.apk release-apk/bloodpoint.apk
          mv release-aab/app-release.aab release-aab/bloodpoint.aab
          cp release-apk/bloodpoint.apk "release-apk/bloodpoint_${{ env.RELEASE_TAG }}.apk"
          cp release-aab/bloodpoint.aab "release-aab/bloodpoint_${{ env.RELEASE_TAG }}.aab"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: BloodPoint ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## BloodPoint Android Release

            This release contains signed Android build artifacts for `${{ env.RELEASE_TAG }}`.

            ### Assets
            - `bloodpoint_${{ env.RELEASE_TAG }}.apk`: Installable release APK
            - `bloodpoint_${{ env.RELEASE_TAG }}.aab`: Release Android App Bundle for Play Store
            - `bloodpoint.apk`: Generic release APK (same as versioned)
            - `bloodpoint.aab`: Generic release AAB (same as versioned)
            - `checksums.txt`: SHA256 checksums for verification

            ### Verification
            Verify the integrity of downloaded files:
            ```bash
            sha256sum bloodpoint_${{ env.RELEASE_TAG }}.apk
            ```
            Compare with checksums.txt

            ### Build Info
            - Android source repo: Private repository
            - Source ref: `${{ env.ANDROID_REF }}`
            - Built by workflow: `${{ github.workflow }}`
            - Run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            
            ### Installation
            Download the APK file and install on Android 6.0 or later.
            
            **Note:** You may need to enable "Install from Unknown Sources" in your device settings.
          files: |
            release-apk/*.apk
            release-aab/*.aab
            release-apk/checksums.txt
            release-aab/checksums.txt

# Secrets required in GitHub repository settings:
# Required secrets:
# - MOBILE_APP_REPO: Private Android repository in owner/name format (example: imShakil/BloodPoint)
# - MOBILE_APP_PAT: Fine-grained PAT with read access to MOBILE_APP_REPO
# - GOOGLE_MAPS_API_KEY: Restricted Google Maps API key
# - GOOGLE_SERVICES_JSON_BASE64: Base64-encoded android/app/google-services.json
# - KEYSTORE_JKS_BASE64: Base64-encoded release keystore (.jks) content
# - KEYSTORE_PASSWORD: Release keystore password
# - KEYSTORE_KEY_ALIAS: Release keystore key alias
# - KEYSTORE_KEY_PASSWORD: Release keystore key password
#
# Optional secrets:
# - CODECOV_TOKEN: Codecov upload token for private repositories
#
# Security best practices implemented:
# 1. Harden-Runner: Network egress auditing and monitoring
# 2. Minimal permissions: Each job has only required permissions
# 3. File permissions: Sensitive files set to 600 (owner read/write only)
# 4. Gradle wrapper validation: Checksum verification
# 5. Checksums: SHA256 for all release artifacts
# 6. Cleanup: Sensitive files removed after use
# 7. Error handling: set -euo pipefail for bash scripts
# 8. Artifact retention: Different retention periods based on importance
# 9. Trivy scanning: Vulnerability scanning with severity filtering
# 10. No daemon: Gradle runs without daemon for CI security
