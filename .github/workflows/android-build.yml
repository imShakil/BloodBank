name: BloodPoint Android CI/CD

on:
  # push:
  #   branches: [ main, develop ]
  # pull_request:
  #   branches: [ main, develop ]
  workflow_dispatch:

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4096m

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> local.properties
      
      - name: Create keystore.properties for CI
        run: |
          echo "storeFile=keystore/release.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}" >> keystore.properties
      
      - name: Lint Analysis
        run: ./gradlew lint
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      
      - name: Build Release APK
        run: ./gradlew assembleRelease
      
      - name: Build Release AAB (Android App Bundle)
        run: ./gradlew bundleRelease
      
      - name: Run Unit Tests
        run: ./gradlew test
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v3
        with:
          name: bloodpoint-debug
          path: android/app/build/outputs/apk/debug/*.apk
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v3
        with:
          name: bloodpoint-release
          path: android/app/build/outputs/apk/release/*.apk
      
      - name: Upload Release AAB
        uses: actions/upload-artifact@v3
        with:
          name: bloodpoint-aab
          path: android/app/build/outputs/bundle/release/*.aab
      
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: android/app/build/reports/tests/testDebugUnitTest/

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> local.properties
      
      - name: Check for exposed secrets
        run: |
          ./gradlew checkSecrets || true
      
      - name: Generate coverage reports
        run: ./gradlew test --info
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./android/app/build/reports/coverage/debug/report.xml

  security-scanning:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-to-play-store-staging:
    name: Deploy to Play Store (Staging)
    runs-on: ubuntu-latest
    needs: [build, code-quality]
    if: github.ref == 'refs/heads/develop'
    defaults:
      run:
        working-directory: android
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> local.properties
      
      - name: Create keystore.properties
        run: |
          echo "storeFile=keystore/release.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}" >> keystore.properties
      
      - name: Build Release AAB
        run: ./gradlew bundleRelease
      
      - name: Deploy to Play Store (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.bloodpoint.iunoob
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft

# Secrets required in GitHub repository settings:
# - GOOGLE_MAPS_API_KEY: Restricted Google Maps API key
# - KEYSTORE_PASSWORD: Release keystore password
# - KEYSTORE_KEY_ALIAS: Release keystore key alias
# - KEYSTORE_KEY_PASSWORD: Release keystore key password
# - SERVICE_ACCOUNT_JSON: Google Play Service Account JSON (base64 encoded)
